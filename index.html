<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clock</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&family=Orbitron:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root, [data-theme="light"] {
    --color-bg: #f7f6f2;
    --color-surface: #f0ede8;
    --color-surface-2: #e8e5df;
    --color-text: #28251d;
    --color-text-muted: #7a7974;
    --color-text-faint: #bab9b4;
    --color-primary: #01696f;
    --color-divider: #dcd9d5;
    --color-border: oklch(from #28251d l c h / 0.12);
    --color-error: #a13544;
    --color-success: #437a22;
    --font-display: 'Orbitron', monospace;
    --font-body: 'Inter', sans-serif;
    --transition: 200ms cubic-bezier(0.16, 1, 0.3, 1);
  }

  [data-theme="dark"] {
    --color-bg: #0e0d0c;
    --color-surface: #1c1b19;
    --color-surface-2: #242321;
    --color-text: #cdccca;
    --color-text-muted: #797876;
    --color-text-faint: #5a5957;
    --color-primary: #4f98a3;
    --color-divider: #262523;
    --color-border: oklch(from #cdccca l c h / 0.10);
    --color-error: #dd6974;
    --color-success: #6daa45;
  }

  html, body {
    width: 100%; height: 100dvh;
    background: var(--color-bg);
    color: var(--color-text);
    font-family: var(--font-body);
    transition: background var(--transition), color var(--transition);
    overflow: hidden;
  }

  /* ── Layout ─────────────────────────────────────────────── */
  .clock-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100dvh;
    gap: clamp(0.6rem, 1.5vh, 1.4rem);
    user-select: none;
    padding: 4rem 1rem;
  }

  /* ── Main time display ──────────────────────────────────── */
  .clock-time {
    font-family: var(--font-display);
    font-size: clamp(4rem, 15vw, 13rem);
    font-weight: 300;
    letter-spacing: 0.04em;
    color: var(--color-text);
    line-height: 1;
    transition: color var(--transition);
    text-align: center;
  }

  .colon {
    display: inline-block;
    animation: blink 1s step-end infinite;
    color: var(--color-primary);
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.12; }
  }

  .clock-seconds {
    font-family: var(--font-display);
    font-size: clamp(1.4rem, 3.5vw, 3.5rem);
    font-weight: 300;
    letter-spacing: 0.1em;
    color: var(--color-primary);
    transition: color var(--transition);
  }

  /* ── Date ───────────────────────────────────────────────── */
  .clock-date {
    font-size: clamp(0.75rem, 1.6vw, 1.1rem);
    font-weight: 300;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--color-text-muted);
    transition: color var(--transition);
  }

  /* ── Timezone pill ──────────────────────────────────────── */
  .tz-pill {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.35rem 0.85rem;
    border-radius: 9999px;
    border: 1px solid var(--color-border);
    background: var(--color-surface);
    transition: background var(--transition), border-color var(--transition);
  }

  .tz-icon {
    color: var(--color-primary);
    flex-shrink: 0;
    transition: color var(--transition);
  }

  .tz-name {
    font-size: 0.78rem;
    font-weight: 400;
    letter-spacing: 0.06em;
    color: var(--color-text-muted);
    transition: color var(--transition);
  }

  .tz-offset {
    font-size: 0.72rem;
    font-weight: 300;
    letter-spacing: 0.04em;
    color: var(--color-text-faint);
    padding-left: 0.3rem;
    border-left: 1px solid var(--color-divider);
    transition: color var(--transition), border-color var(--transition);
  }

  /* ── Seconds progress bar ───────────────────────────────── */
  .seconds-bar-track {
    width: clamp(120px, 28vw, 340px);
    height: 2px;
    background: var(--color-divider);
    border-radius: 9999px;
    overflow: hidden;
    transition: background var(--transition);
  }

  .seconds-bar-fill {
    height: 100%;
    background: var(--color-primary);
    border-radius: 9999px;
    transition: width 0.95s linear, background var(--transition);
  }

  /* ── Thin divider ───────────────────────────────────────── */
  .divider {
    width: clamp(48px, 6vw, 100px);
    height: 1px;
    background: var(--color-divider);
    transition: background var(--transition);
  }

  /* ── Sync status ─────────────────────────────────────────── */
  .sync-status {
    display: flex;
    align-items: center;
    gap: 0.45rem;
    font-size: 0.68rem;
    font-weight: 400;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    color: var(--color-text-faint);
    transition: color var(--transition);
  }

  .sync-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--color-text-faint);
    flex-shrink: 0;
    transition: background 0.4s ease;
  }
  .sync-dot.synced  { background: var(--color-success); }
  .sync-dot.syncing { background: var(--color-primary); animation: pulse 1s ease-in-out infinite; }
  .sync-dot.error   { background: var(--color-error); }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.4; transform: scale(0.65); }
  }

  /* ── Corner buttons ─────────────────────────────────────── */
  .corner-btn {
    position: fixed;
    width: 44px; height: 44px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%;
    border: 1px solid var(--color-border);
    background: var(--color-surface);
    color: var(--color-text-muted);
    cursor: pointer;
    transition: background var(--transition), color var(--transition),
                border-color var(--transition), box-shadow var(--transition), transform 80ms;
  }
  .corner-btn:hover {
    color: var(--color-text);
    box-shadow: 0 2px 8px oklch(0.2 0.01 80 / 0.12);
  }
  .corner-btn:active { transform: scale(0.93); }

  #fullscreenBtn { top: 1.25rem; left: 1.25rem; }
  #syncBtn       { bottom: 1.25rem; right: 1.25rem; }
  #themeToggle   { top: 1.25rem; right: 1.25rem; }
  /* ── Sync button spin ──────────────────────────────────── */
  @keyframes spin { to { transform: rotate(360deg); } }
  .syncing-spin { animation: spin 0.7s linear infinite; }
</style>
</head>
<body>

<button class="corner-btn" id="fullscreenBtn" aria-label="Toggle fullscreen">
  <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <path d="M8 3H5a2 2 0 0 0-2 2v3M21 8V5a2 2 0 0 0-2-2h-3M16 21h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
  </svg>
</button>

<button class="corner-btn" id="themeToggle" aria-label="Switch to light mode">
</button>

<button class="corner-btn" id="syncBtn" aria-label="Sync time now">
  <svg id="syncBtnIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
</button>

<div class="clock-wrapper" role="main" aria-label="Clock">
  <div class="clock-date" id="clockDate">—</div>

  <div class="clock-time" aria-live="polite">
    <span id="timeHM">--:--</span><span class="colon" aria-hidden="true">.</span>
  </div>

  <div class="clock-seconds" id="clockSec" aria-label="Seconds">--</div>

  <div class="seconds-bar-track" aria-hidden="true">
    <div class="seconds-bar-fill" id="secBar" style="width:0%"></div>
  </div>

  <div class="divider" aria-hidden="true"></div>

  <!-- Timezone pill -->
  <div class="tz-pill" id="tzPill" aria-label="Timezone">
    <svg class="tz-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="10"/>
      <path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
    </svg>
    <span class="tz-name" id="tzName">Detecting…</span>
    <span class="tz-offset" id="tzOffset"></span>
  </div>

  <!-- Sync status -->
  <div class="sync-status">
    <div class="sync-dot syncing" id="syncDot"></div>
    <span id="syncLabel">Syncing with timeapi.io…</span>
  </div>
</div>

<script>
// ── Theme ──────────────────────────────────────────────────────────────────
(function () {
  const toggle = document.getElementById('themeToggle');
  const root = document.documentElement;
  let theme = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  // page default is dark; keep that if system is also dark
  theme = root.getAttribute('data-theme') || theme;

  const moonSVG = `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;
  const sunSVG  = `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>`;

  function apply(t) {
    theme = t;
    root.setAttribute('data-theme', t);
    toggle.innerHTML = t === 'dark' ? sunSVG : moonSVG;
    toggle.setAttribute('aria-label', `Switch to ${t === 'dark' ? 'light' : 'dark'} mode`);
  }
  apply(theme);
  toggle.addEventListener('click', () => apply(theme === 'dark' ? 'light' : 'dark'));
})();

// ── Fullscreen ─────────────────────────────────────────────────────────────
document.getElementById('fullscreenBtn').addEventListener('click', () => {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(() => {});
  else document.exitFullscreen().catch(() => {});
});

// ── Clock + Sync ───────────────────────────────────────────────────────────
(function () {
  const elDate   = document.getElementById('clockDate');
  const elTimeHM = document.getElementById('timeHM');
  const elSec    = document.getElementById('clockSec');
  const elBar    = document.getElementById('secBar');
  const elTzName = document.getElementById('tzName');
  const elTzOff  = document.getElementById('tzOffset');
  const elDot    = document.getElementById('syncDot');
  const elLabel  = document.getElementById('syncLabel');

  // Detect user's local IANA timezone (e.g. "Asia/Hong_Kong")
  const localTZ  = Intl.DateTimeFormat().resolvedOptions().timeZone;
  const encodedTZ = encodeURIComponent(localTZ);
  const API_URL  = `https://timeapi.io/api/time/current/zone?timeZone=${encodedTZ}`;

  let serverOffset = 0; // ms drift between server and local clock
  let synced = false;

  const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  function pad2(n) { return String(n).padStart(2, '0'); }

  // UTC offset string e.g. "UTC+8:00"
  function fmtOffset(date) {
    const off = -date.getTimezoneOffset(); // minutes
    const sign = off >= 0 ? '+' : '-';
    const abs  = Math.abs(off);
    const h    = Math.floor(abs / 60);
    const m    = abs % 60;
    return `UTC${sign}${h}${m ? ':' + pad2(m) : ''}`;
  }

  function getSyncedNow() {
    return new Date(Date.now() + serverOffset);
  }

  function render() {
    const now = getSyncedNow();
    const h   = now.getHours();
    const m   = now.getMinutes();
    const s   = now.getSeconds();
    const ms  = now.getMilliseconds();

    elTimeHM.textContent = `${pad2(h)}:${pad2(m)}`;
    elSec.textContent    = pad2(s);
    elDate.textContent   = `${DAYS[now.getDay()]}, ${MONTHS[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;
    elBar.style.width    = `${((s + ms / 1000) / 60) * 100}%`;
  }

  function setTZDisplay(tzString) {
    // Format: "America/New_York" → "America / New York"
    const pretty = tzString.replace(/_/g, ' ');
    elTzName.textContent = pretty;
    elTzOff.textContent  = fmtOffset(new Date());
  }

  function setStatus(state) {
    elDot.className = `sync-dot ${state}`;
    if (state === 'synced') {
      elLabel.textContent = `Synced · timeapi.io`;
    } else if (state === 'syncing') {
      elLabel.textContent = 'Syncing with timeapi.io…';
    } else {
      elLabel.textContent = 'Sync failed — using device time';
    }
  }

  window.sync = async function sync() {
    setStatus('syncing');
    const t0 = Date.now();
    try {
      const res  = await fetch(API_URL, { cache: 'no-store' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      const latency = (Date.now() - t0) / 2;

      // data.dateTime: "2026-05-08T18:52:30.123"
      const serverMs = new Date(data.dateTime).getTime();
      serverOffset   = (serverMs + latency) - Date.now();
      synced = true;

      // Use timezone from API response (confirms what the server recognised)
      const tz = data.timeZone || localTZ;
      setTZDisplay(tz);
      setStatus('synced');
    } catch (e) {
      serverOffset = 0;
      setTZDisplay(localTZ);
      setStatus('error');
    }
  }

  function tick() {
    render();
    const now = getSyncedNow();
    const msToNext = 1000 - now.getMilliseconds();
    setTimeout(tick, msToNext > 5 ? msToNext : 50);
  }

  // Show local TZ immediately before API responds
  setTZDisplay(localTZ);

  sync();
  setInterval(sync, 5 * 60 * 1000); // re-sync every 5 min
  tick();
})();

  // ── Manual sync button ──────────────────────────────────
  (function(){
    const btn  = document.getElementById('syncBtn');
    const icon = document.getElementById('syncBtnIcon');
    btn.addEventListener('click', () => {
      if (icon.classList.contains('syncing-spin')) return;
      icon.classList.add('syncing-spin');
      sync().finally(() => {
        setTimeout(() => icon.classList.remove('syncing-spin'), 500);
      });
    });
  })();
</script>
</body>
</html>
